<!doctype html>
<!-- HTML5文書であることを宣言 -->
<html lang="ja">
  <!-- 言語を日本語に設定 -->

  <head>
    <!-- ブラウザに見えない設定情報エリア -->
    <meta charset="UTF-8" />
    <!-- 文字化け防止（UTF-8を使用） -->
    <title>Task App</title>
    <!-- ブラウザタブに表示されるタイトル -->
    <link rel="stylesheet" href="style.css" />
    <!-- 外部CSSファイル（style.css）を読み込む -->
  </head>

  <body>
    <!-- 画面に表示される部分の開始 -->
    <div class="container">
      <!-- アプリ全体のコンテナ（中央配置やスタイル用の枠） -->
      <h1>Task App</h1>
      <!-- アプリのタイトル -->
      <button id="logoutBtn">Logout</button>
      <!-- ログアウトボタン -->   
      <!-- 状態表示エリア -->
      <div id="error" class="error hidden"></div>
      <!-- エラーメッセージ -->
      <div id="loading" class="loading hidden">Loading...</div>
      <!-- ローディング -->

      <div class="form-area">
        <!-- 入力エリア -->
        <input type="text" id="taskInput" placeholder="タスクを入力" />
        <!-- 入力欄 -->
        <button id="addBtn">追加</button>
        <!-- 追加ボタン -->
        <p id="errorMessage"></p>
        <!-- エラー内容を動的に表示するための領域 -->
      </div>

      <ul id="taskList"></ul>
      <!-- 追加されたタスクを表示するリスト -->
      <script src="js/api.js"></script>
      <script src="js/ui.js"></script>
      <script type="module" src="./js/app.js"></script>
      <!-- JavaScript読み込み -->
    </div>
  </body>
</html>
