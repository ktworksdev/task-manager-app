<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="auth-container">
    <h1>ログイン</h1>
    <form id="loginForm">
      <input
        type="email"
        id="email"
        placeholder="メールアドレス"
        required
      >
      <input
        type="password"
        id="password"
        placeholder="パスワード"
        required
      >
      <button type="submit">
        ログイン
      </button>
    </form>
    <p id="errorMessage"></p>
  </div>
  <script src="/js/login.js" defer></script>
</body>
</html>
