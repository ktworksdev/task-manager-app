<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="auth-container">
    <h1>ログイン</h1>

    <form id="loginForm">
      <input
        type="email"
        id="email"
        placeholder="メールアドレス"
        required
      >
      <input
        type="password"
        id="password"
        placeholder="パスワード"
        required
      >
      <button id="loginBtn" type="submit">
        ログイン
      </button>
    </form>
    
    <div id="loading" class="loading hidden">
      Loading...
    </div>
    
    <p id="error" class="hidden"></p>
    
    <p>
      <a href="register.html">
        新規登録はこちら
      </a>
    </p>
    
  </div>
  <script type="module" src="/js/login.js"></script>
</body>
</html>
