<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>新規登録</h1>

<form id="registerForm">

    <input
        type="email"
        id="email"
        placeholder="メールアドレス"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="パスワード"
        required
    >

    <button type="submit">
        登録
    </button>

</form>

<p id="message"></p>

<p>
    <a href="login.html">
        ログインはこちら
    </a>
</p>

<script type="module" src="js/register.js"></script>

</body>
</html>
